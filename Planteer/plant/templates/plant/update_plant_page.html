{% extends 'main/base.html' %}
{% load static %}
{% block title %}Update Plant Page{% endblock %}

{% block content %}
<div class="container mt-5">
    <h1 class="mb-4">Update {{plant.name}}</h1>
    
    <form method="post" action="{%url 'plant:update_plant_view' plant.id%}" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Update Plant</button>
    </form>
</div>

{% endblock %}
