{% extends 'main/base.html' %}
{% load static %}
{% block title %}Show Plant{% endblock %}

{% block content %}
<div class="container mt-5">
        <h1 class="mb-4">All Plants ({{ plants.count }})</h1>
        {% if plants %}
            <div class="d-flex justify-content-end mb-3">
                <form action="{% url 'plant:plants_view' %}" method="get" >
                    <div class="d-flex gap-3">
                        <form method="get" class="d-flex gap-2 align-items-center flex-wrap mb-4">
                        
                            <input type="text" name="search" class="form-control" placeholder="Search by name" value="{{ request.GET.search }}">
                        
                            <select name="category" class="form-select">
                                <option value="">All Categories</option>
                                <option value="FRUIT" {% if request.GET.category == "FRUIT" %}selected{% endif %}>Fruit</option>
                                <option value="VEGETABLE" {% if request.GET.category == "VEGETABLE" %}selected{% endif %}>Vegetable</option>
                                <option value="FLOWER" {% if request.GET.category == "FLOWER" %}selected{% endif %}>Flower</option>
                                <option value="HERB" {% if request.GET.category == "HERB" %}selected{% endif %}>Herb</option>
                            </select>
                        
                            <select name="is_edible" class="form-select">
                                <option value="">All</option>
                                <option value="true" {% if request.GET.is_edible == "true" %}selected{% endif %}>Edible</option>
                                <option value="false" {% if request.GET.is_edible == "false" %}selected{% endif %}>Not Edible</option>
                            </select>
                            <select name="country" class="form-select">
                                <option value="">All Countries</option>
                                {% for country in countries %}
                                    <option value="{{ country.id }}" {% if request.GET.country == country.id|stringformat:"s" %}selected{% endif %}>
                                        {{ country.name }}
                                    </option>
                                {% endfor %}
                            </select>
                        
                            <button type="submit" class="btn btn-primary">Apply</button>
                            <a href="{% url 'plant:plants_view' %}" class="btn btn-secondary">Reset</a>
                        </form>
                    </div>
                </form>
            
            </div>
        {% else %}
             <p>No plants found.</p>
        {% endif %}
        {% include 'plant/plant_card.html' %}
</div>
{% endblock %}
