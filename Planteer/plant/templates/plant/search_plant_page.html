{% extends 'main/base.html' %}
{% load static %}
{% block title %}Search Plant{% endblock %}

{% block content %}
<div class="container mt-5">
    <h1 class="mb-4">Search Results </h1>
    <div class="row row-cols-1 row-cols-md-3 g-4 mt-5">
        <form class="d-flex margin-auto " role="search" >
            <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
            <button class="btn btn-outline-success" type="submit">Search</button>
        </form>
        {% for plant in plants %}
        <div class="col">
            <div class="card">
                <img src="{{ plant.image.url }}" class="card-img-top" alt="...">
                <div class="card-body text-start">
                    <a href="{% url 'plant:detail_plant_view' plant.id %}">
                        <h5 class="card-title">{{ plant.name }}</h5>
                    </a>
                    <p class="card-text">{{ plant.about }}</p>
                    <p class="card-text">{{ plant.get_category_display }}</p>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
{% endblock %}
