{% extends 'main/base.html' %}
{% load static %}
{% block title %}Delete Plant{% endblock %}

{% block content %}
<div class="container mt-5">
    <h2>Delete Plant</h2>
    <p>Are you sure you want to delete {{ plant.name }}?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'plant:detail_plant_view' plant.id %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
