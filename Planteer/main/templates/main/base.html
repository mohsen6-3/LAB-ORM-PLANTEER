{% load static %}
<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&" />
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <title>{% block title %} {% endblock %}</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'main:home_view' %}">Planteer</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-2">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'plant:plants_view' %}">All Plants</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Contact Us</a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-outline-success" href="{% url 'plant:new_plant_view' %}">Add Plant </a>
                    </li>
                   
                    <!-- <li class="nav-item">
                        <a class="nav-link" href="#">Pricing</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link disabled" aria-disabled="true">Disabled</a>
                    </li> -->
                </ul>
            </div>
        </div>
    </nav>
    <main>
        {% block content %}
        {% endblock %}
    </main>
    
    <!-- <footer class="bg-light text-center text-lg-start mt-5 border-top footer">
        <div class="text-center p-3 m-0" style="background-color: rgba(0, 0, 0, 0.2);">
            © 2026 Copyright:
            <a class="text-dark" href="#">Planteer.com</a>
        </div>
    </footer> -->
    <footer class="footer pt-5 pb-4 mt-5 ">
        <div class="container text-md-left">
            <hr class="mb-4">
    
            <div class="row text-md-left">
    
                <!-- Logo -->
                <div class="col-md-3 col-lg-3 col-xl-3 mx-auto mt-3">
                    <h5 class="mb-4 font-weight-bold">Planteer</h5>
                    <p>© 2026 Planteer. All rights reserved.</p>
                </div>
    
                <!-- Section 1 -->
                <div class="col-md-2 col-lg-2 col-xl-2 mx-auto mt-3">
                    <h5 class="mb-4">Plant</h5>
                    <p><a href="{% url 'main:home_view' %}" class="text-black text-decoration-none">Home</a></p>
                    <p><a href="{% url 'plant:plants_view' %}" class="text-black text-decoration-none">All Plants</a></p>
                    <p><a href="{% url 'plant:new_plant_view' %}" class="text-black text-decoration-none">Add Plant</a></p>

                </div>
    
                <!-- Section 2 -->
                <div class="col-md-2 col-lg-2 col-xl-2 mx-auto mt-3">
                    <h5 class="mb-4">Contact</h5>
                    <p><a href="#" class="text-black text-decoration-none">Contact Us</a></p>
                    <p><a href="#" class="text-black text-decoration-none">Feedback</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
