{% extends 'main/base.html' %}
{% load static %}
{% block title %}Show Plant{% endblock %}

{% block content %}
<div class="container mt-5">
    <h1 class="mb-4">All Plants</h1>
    <div class="row row-cols-1 row-cols-md-3 g-4 mt-5">
        {% for plant in plants %}
        <div class="col">
            <div class="card">
                <img src="{{ plant.image.url }}" class="card-img-top" alt="...">
                <div class="card-body">
                    <a href="{% url 'plant:detail_plant_view' plant.id %}">
                        <h5 class="card-title">{{ plant.name }}</h5>
                    </a>
                    <p class="card-text">category: {{ plant.get_category_display }}</p>
                    <p class="card-text">created at: {{ plant.created_at }}</p>
                </div>
            </div>
        </div>
        {% endfor %}

</div>
{% endblock %}
